name: 🔧 Maintenance Tasks

on:
  schedule:
    - cron: '0 3 * * 1' # Every Monday at 3 AM
    - cron: '0 5 1 * *' # First day of every month at 5 AM
  workflow_dispatch:
    inputs:
      task:
        description: 'Maintenance task to run'
        required: true
        default: 'dependencies'
        type: choice
        options:
        - dependencies
        - cleanup
        - security-update
        - all

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dependency-updates:
    name: 📦 Update Dependencies
    runs-on: ubuntu-latest
    if: github.event.inputs.task == 'dependencies' || github.event.inputs.task == 'all' || github.event_name == 'schedule'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 📦 Update dependencies
        run: |
          pnpm update --latest
          pnpm dedupe

      - name: 🧪 Run tests after update
        run: pnpm test
        env:
          NODE_ENV: test

      - name: 🔍 Check for security vulnerabilities
        run: pnpm audit --audit-level moderate
        continue-on-error: true

      - name: 📝 Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update dependencies'
          title: '📦 Automated dependency updates'
          body: |
            ## 📦 Dependency Updates
            
            This PR contains automated dependency updates.
            
            ### What's changed:
            - Updated all dependencies to their latest versions
            - Ran tests to ensure compatibility
            - Checked for security vulnerabilities
            
            ### Testing:
            - [x] Tests pass
            - [x] Build succeeds
            - [x] Security audit passed
            
            ---
            🤖 This PR was created automatically by the maintenance workflow.
          branch: chore/dependency-updates
          labels: |
            dependencies
            automated
            maintenance

  security-updates:
    name: 🔐 Security Updates
    runs-on: ubuntu-latest
    if: github.event.inputs.task == 'security-update' || github.event.inputs.task == 'all' || github.event_name == 'schedule'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔐 Fix security vulnerabilities
        run: |
          pnpm audit --fix
          pnpm dedupe

      - name: 🧪 Run tests after security fixes
        run: pnpm test
        env:
          NODE_ENV: test

      - name: 📝 Create Pull Request for security fixes
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'fix: security vulnerability updates'
          title: '🔐 Security vulnerability fixes'
          body: |
            ## 🔐 Security Updates
            
            This PR contains automated security vulnerability fixes.
            
            ### What's fixed:
            - Applied security patches for vulnerable dependencies
            - Updated packages with known vulnerabilities
            
            ### Testing:
            - [x] Tests pass
            - [x] Build succeeds
            - [x] Security vulnerabilities resolved
            
            ---
            🚨 This is a security update - please review and merge promptly.
            🤖 This PR was created automatically by the maintenance workflow.
          branch: fix/security-updates
          labels: |
            security
            automated
            maintenance
            priority-high

  cleanup-tasks:
    name: 🧹 Cleanup Tasks
    runs-on: ubuntu-latest
    if: github.event.inputs.task == 'cleanup' || github.event.inputs.task == 'all' || github.event_name == 'schedule'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧹 Clean up old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 10

      - name: 🧹 Clean up old artifacts
        run: |
          gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '.artifacts[] | select(.created_at < (now - 86400 * 7 | strftime("%Y-%m-%dT%H:%M:%SZ"))) | .id' \
            | xargs -I {} gh api repos/${{ github.repository }}/actions/artifacts/{} -X DELETE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧹 Clean up old branches
        run: |
          git remote prune origin
          git branch -r --merged | grep -v main | grep -v develop | sed 's/origin\///' | xargs -n 1 git push --delete origin || true

  health-check:
    name: 🏥 System Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.task == 'all'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏥 Run comprehensive health checks
        run: |
          echo "## 🏥 System Health Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check package.json for issues
          echo "### 📦 Package Health" >> $GITHUB_STEP_SUMMARY
          pnpm ls --depth=0 >> package_health.txt 2>&1 || true
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -20 package_health.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check for outdated dependencies
          echo "### 📊 Dependency Status" >> $GITHUB_STEP_SUMMARY
          pnpm outdated >> outdated.txt 2>&1 || true
          if [ -s outdated.txt ]; then
            echo "Outdated packages found:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            head -10 outdated.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All packages are up to date" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check build health
          echo "### 🏗️ Build Health" >> $GITHUB_STEP_SUMMARY
          if pnpm run build; then
            echo "✅ Build successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📧 Create issue for critical problems
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Critical System Health Issue Detected',
              body: `## 🚨 Critical Issue Detected
              
              The automated health check has detected critical issues that require immediate attention.
              
              **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              
              Please investigate and resolve these issues as soon as possible.
              
              ---
              🤖 This issue was created automatically by the maintenance workflow.`,
              labels: ['bug', 'critical', 'automated', 'maintenance']
            })

  maintenance-summary:
    name: 📊 Maintenance Summary
    runs-on: ubuntu-latest
    needs: [dependency-updates, security-updates, cleanup-tasks, health-check]
    if: always()
    
    steps:
      - name: 📊 Generate maintenance summary
        run: |
          echo "## 🔧 Maintenance Tasks Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Task | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Updates | ${{ needs.dependency-updates.result == 'success' && '✅ Completed' || needs.dependency-updates.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Updates | ${{ needs.security-updates.result == 'success' && '✅ Completed' || needs.security-updates.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cleanup Tasks | ${{ needs.cleanup-tasks.result == 'success' && '✅ Completed' || needs.cleanup-tasks.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ${{ needs.health-check.result == 'success' && '✅ Passed' || needs.health-check.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY