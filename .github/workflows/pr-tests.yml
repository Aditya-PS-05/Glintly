name: 🔍 PR Test Requirements

on:
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened, ready_for_review]

# This workflow MUST pass before PR can be merged
concurrency:
  group: pr-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  required-tests:
    name: ✅ Required Tests (Block Merge)
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Generate Prisma client
        run: pnpm dlx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: 🗄️ Run database migrations
        run: pnpm dlx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: 🔍 Lint code (REQUIRED)
        run: pnpm run lint

      - name: 🔍 Type check (REQUIRED)
        run: pnpm dlx tsc --noEmit

      - name: 🧪 Run all tests (REQUIRED)
        run: pnpm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          NEXTAUTH_SECRET: test-secret-key-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: 📊 Verify minimum test coverage
        run: |
          echo "Checking test coverage requirements..."
          # Add coverage threshold check here if needed
          # istanbul check-coverage --lines 80 --functions 80 --branches 80

      - name: 🏗️ Verify build succeeds (REQUIRED)
        run: pnpm run build
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          NEXTAUTH_SECRET: test-secret-key-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: ✅ All tests passed
        run: |
          echo "🎉 All required tests passed!"
          echo "PR is ready for review and merge."

  test-coverage-report:
    name: 📊 Test Coverage Report
    runs-on: ubuntu-latest
    needs: [required-tests]
    if: always() && github.event.pull_request.draft == false
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Generate Prisma client
        run: pnpm dlx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

      - name: 🧪 Generate coverage report
        run: pnpm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          NEXTAUTH_SECRET: test-secret-key-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: 📊 Comment coverage on PR
        uses: romeovs/lcov-reporter-action@v0.4.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage/lcov.info
          delete-old-comments: true

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage/lcov.info
          flags: pr-tests
          name: pr-coverage

  security-check:
    name: 🔐 Security Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Run security audit
        run: pnpm audit --audit-level moderate

      - name: 🔑 Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  pr-summary:
    name: 📋 PR Summary
    runs-on: ubuntu-latest
    needs: [required-tests, test-coverage-report, security-check]
    if: always()
    
    steps:
      - name: 📋 Generate PR summary
        run: |
          echo "## 🔍 PR Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status | Required |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Required Tests | ${{ needs.required-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} | ✅ Yes |" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Report | ${{ needs.test-coverage-report.result == 'success' && '✅ Generated' || '⚠️ Failed' }} | ❌ No |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Check | ${{ needs.security-check.result == 'success' && '✅ Passed' || '⚠️ Failed' }} | ❌ No |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.required-tests.result }}" = "success" ]; then
            echo "🎉 **All required tests passed!** This PR is ready for review." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Required tests failed!** This PR cannot be merged until all tests pass." >> $GITHUB_STEP_SUMMARY
          fi